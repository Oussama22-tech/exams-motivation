<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Go Booba Go</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg, #ffe7f3, #fff7d6);
  overflow: hidden;
}

.title {
  position: absolute;
  top: 20px;
  width: 100%;
  text-align: center;
  font-size: 40px;
  font-weight: bold;
}

.subtitle {
  position: absolute;
  top: 70px;
  width: 100%;
  text-align: center;
}

.btns {
  position: absolute;
  top: 120px;
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 10px;
}

button {
  padding: 12px 20px;
  border-radius: 999px;
  border: none;
  background: #8a5a44;
  color: white;
  cursor: pointer;
}

.lyrics {
  position: absolute;
  bottom: 200px;
  width: 100%;
  text-align: center;
  font-size: 24px;
  font-weight: bold;
}

/* GIF */
.gif-wrap {
  position: absolute;
  left: 50%;
  top: 55%;
  transform: translate(-50%, -50%);
  width: 260px;
  animation: bounce 1s infinite;
}

.gif-wrap img {
  width: 100%;
  border-radius: 20px;
}

@keyframes bounce {
  0%,100% { transform: translate(-50%, -50%); }
  50% { transform: translate(-50%, -55%); }
}

/* Effects */
.note {
  position: absolute;
  font-size: 30px;
  animation: float 3s linear infinite;
}

@keyframes float {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-200px); opacity: 0; }
}
</style>
</head>

<body>

<div class="title">🐻 Go Booba Go 🐻</div>
<div class="subtitle">EXAMS ARE ALMOST DONE</div>

<div class="btns">
  <button onclick="playSong()">Play Song</button>
</div>

<div class="lyrics" id="lyrics">Press Play</div>

<!-- 🎯 YOUR GIF -->
<div class="gif-wrap">
  <img src="twerk.gif">
</div>

<!-- 🎵 YOUR AUDIO -->
<audio id="song">
  <source src="go-booba-go.mp4" type="audio/mp4">
</audio>

<script>
const song = document.getElementById("song");
const lyrics = document.getElementById("lyrics");

function playSong() {
  song.currentTime = 0;
  song.play();

  lyrics.innerText = "🎵 Go booba go...";
  setTimeout(()=> lyrics.innerText = "🎵 you gotta make it done...",1500);
  setTimeout(()=> lyrics.innerText = "🎵 Go booba go...",3000);
  setTimeout(()=> lyrics.innerText = "🎵 exams are almost done!",4500);
  setTimeout(()=> lyrics.innerText = "🔥 YOU GOT THIS 🔥",6500);

  startNotes();
}

function startNotes(){
  let interval = setInterval(()=>{
    let n = document.createElement("div");
    n.className = "note";
    n.innerText = "🎵";
    n.style.left = Math.random()*100+"%";
    n.style.top = "60%";
    document.body.appendChild(n);
    setTimeout(()=> n.remove(),3000);
  },300);

  setTimeout(()=> clearInterval(interval),7000);
}
</script>

</body>
</html>
